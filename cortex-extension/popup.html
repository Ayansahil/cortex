<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #fff;
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      padding: 16px 18px 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .logo {
      width: 32px; height: 32px;
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; color: white;
    }
    .header-text h1 { font-size: 15px; font-weight: 700; color: white; }
    .header-text p { font-size: 11px; color: rgba(255,255,255,0.7); margin-top: 1px; }
    #loginScreen { padding: 18px; }
    .login-title { font-size: 14px; font-weight: 600; color: #e5e7eb; margin-bottom: 4px; }
    .login-sub { font-size: 11px; color: #6b7280; margin-bottom: 16px; }
    .field { margin-bottom: 12px; }
    .field label {
      display: block; font-size: 11px; color: #9ca3af;
      margin-bottom: 5px; text-transform: uppercase;
      letter-spacing: 0.06em; font-weight: 600;
    }
    .field input {
      width: 100%; padding: 9px 12px;
      background: #16161f;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px; color: #fff;
      font-size: 13px; outline: none; transition: border 0.15s;
    }
    .field input:focus { border-color: rgba(99,102,241,0.5); }
    .login-btn {
      width: 100%; padding: 11px;
      background: #6366f1; border: none;
      border-radius: 8px; color: white;
      font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all 0.15s; margin-top: 4px;
    }
    .login-btn:hover { background: #4f46e5; }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .login-error {
      margin-top: 10px; padding: 8px 12px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 6px; font-size: 12px;
      color: #f87171; display: none; text-align: center;
    }
    #saveScreen { display: none; }
    .body { padding: 14px 18px; }
    .page-info {
      background: #16161f;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; padding: 11px 13px; margin-bottom: 12px;
    }
    .page-label {
      font-size: 10px; color: #6b7280;
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 5px; font-weight: 600;
    }
    .page-title {
      font-size: 13px; font-weight: 600; color: #e5e7eb;
      line-height: 1.4; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px;
    }
    .page-url {
      font-size: 11px; color: #6366f1;
      white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; font-family: monospace;
    }
    .type-row { display: flex; gap: 7px; margin-bottom: 12px; }
    .type-btn {
      flex: 1; padding: 7px 4px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08);
      background: #16161f; color: #9ca3af;
      font-size: 10px; font-weight: 600;
      cursor: pointer; text-align: center; transition: all 0.15s;
    }
    .type-btn.active {
      background: rgba(99,102,241,0.15);
      border-color: rgba(99,102,241,0.4); color: #a5b4fc;
    }
    .type-btn:hover:not(.active) { background: #1e1e2a; }
    .type-icon { font-size: 13px; display: block; margin-bottom: 2px; }
    .save-btn {
      width: 100%; padding: 11px;
      background: #6366f1; border: none;
      border-radius: 10px; color: white;
      font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center;
      justify-content: center; gap: 7px;
    }
    .save-btn:hover { background: #4f46e5; transform: translateY(-1px); }
    .save-btn:active { transform: scale(0.98); }
    .save-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .status {
      margin-top: 10px; padding: 9px 12px;
      border-radius: 8px; font-size: 12px;
      font-weight: 600; text-align: center; display: none;
    }
    .status.success {
      background: rgba(16,185,129,0.12);
      border: 1px solid rgba(16,185,129,0.3); color: #34d399;
    }
    .status.error {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3); color: #f87171;
    }
    .footer {
      padding: 8px 18px 14px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .open-app {
      font-size: 11px; color: #6366f1;
      background: none; border: none; cursor: pointer; padding: 0;
    }
    .open-app:hover { color: #a5b4fc; }
    .logout-btn {
      font-size: 11px; color: #6b7280;
      background: none; border: none; cursor: pointer; padding: 0;
    }
    .logout-btn:hover { color: #f87171; }
    .user-badge {
      font-size: 10px; color: #6b7280;
      background: #16161f;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px; padding: 3px 10px;
      max-width: 120px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">C</div>
    <div class="header-text">
      <h1>Cortex</h1>
      <p>Your Second Brain</p>
    </div>
  </div>

  <div id="loginScreen">
    <p class="login-title" style="margin-top:16px;">Welcome back</p>
    <p class="login-sub">Login to save pages to Cortex</p>
    <div class="field">
      <label>Email</label>
      <input type="email" id="emailInput" placeholder="you@email.com" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="passwordInput" placeholder="••••••••" />
    </div>
    <button class="login-btn" id="loginBtn">Login to Cortex</button>
    <div class="login-error" id="loginError">Invalid email or password</div>
  </div>

  <div id="saveScreen">
    <div class="body">
      <div class="page-info">
        <div class="page-label">Current Page</div>
        <div class="page-title" id="pageTitle">Loading...</div>
        <div class="page-url" id="pageUrl">...</div>
      </div>
      <div class="type-row">
        <button class="type-btn active" data-type="article">
          <span class="type-icon">📄</span>Article
        </button>
        <button class="type-btn" data-type="video">
          <span class="type-icon">🎬</span>Video
        </button>
        <button class="type-btn" data-type="tweet">
          <span class="type-icon">🐦</span>Tweet
        </button>
        <button class="type-btn" data-type="image">
          <span class="type-icon">🖼</span>Image
        </button>
      </div>
      <button class="save-btn" id="saveBtn">
        <span>＋</span> Save to Cortex
      </button>
      <div class="status" id="status"></div>
    </div>
    <div class="footer">
      <button class="open-app" id="openApp">Open Cortex ↗</button>
      <span class="user-badge" id="userBadge"></span>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
